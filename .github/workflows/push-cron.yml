name: 'Push Notification Cron'

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  trigger-product-listener:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke product_listener
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_FUNCTIONS_URL }}/product_listener" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' 
        env:
          SUPABASE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
